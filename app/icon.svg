<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fundo arredondado dark -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>

  <!-- Página esquerda do livro -->
  <path d="M16 22.5 L7.5 20.5 L7.5 10.5 Q7.5 9.5 8.5 9.8 L15.5 11.5 Q16 11.7 16 12.2 Z" fill="#7c3aed"/>

  <!-- Página direita do livro -->
  <path d="M16 22.5 L24.5 20.5 L24.5 10.5 Q24.5 9.5 23.5 9.8 L16.5 11.5 Q16 11.7 16 12.2 Z" fill="#a78bfa"/>

  <!-- Lombada central -->
  <rect x="15.2" y="11.4" width="1.6" height="11.2" rx="0.5" fill="#c4b5fd"/>

  <!-- Linhas na página esquerda -->
  <line x1="10" y1="14.5" x2="14.2" y2="13.7" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="10" y1="16.5" x2="14.2" y2="15.7" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="10" y1="18.5" x2="14.2" y2="17.7" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <!-- Linhas na página direita -->
  <line x1="22" y1="14.5" x2="17.8" y2="13.7" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="22" y1="16.5" x2="17.8" y2="15.7" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="22" y1="18.5" x2="17.8" y2="17.7" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <!-- Brilho sutil no topo -->
  <rect x="1" y="1" width="30" height="4" rx="6" fill="white" opacity="0.04"/>
</svg>
